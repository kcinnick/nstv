{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>➕ Add New Show</h1>
    <p>Add a TV show to your collection</p>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form action="/add_show" method="post">
        {% csrf_token %}
        {{ add_show_form }}
        <input type="submit" value="✓ Add Show" style="margin-top: 24px; width: 100%;">
    </form>
</div>
{% endblock %}
