{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>🎬 Add New Movie</h1>
    <p>Add a movie to your collection</p>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form action="/add_movie" method="post">
        {% csrf_token %}
        {{ add_movie_form }}
        <input type="submit" value="✓ Add Movie" style="margin-top: 24px; width: 100%;">
    </form>
</div>
{% endblock %}
