{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>📺 NSTV Dashboard</h1>
    <p>Your personal TV show and movie download manager</p>
</div>

<div class="card">
    <div class="card-title">Download Episode</div>
    <form action="/" method="post">
        {% csrf_token %}
        {{ download_form }}
        <input type="submit" value="🔽 Start Download" style="margin-top: 16px;">
    </form>
</div>
{% endblock %}
