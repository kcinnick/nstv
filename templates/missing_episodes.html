{% extends "base.html" %}
{% load render_table from django_tables2 %}

{% block content %}

<div class="page-header">
    <h1>🔍 Missing Episodes</h1>
    <p>Episodes not yet available for <strong>{{ show.title }}</strong></p>
</div>

<div class="mb-3">
    <a href="/shows/{{ show.id }}" class="button">← Back to Show</a>
</div>

<div class="text-center">
    {% render_table episodes %}
</div>

{% endblock %}
